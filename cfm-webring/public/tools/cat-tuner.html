<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cat Rotation Tuner</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: monospace; overflow: hidden; }

  .controls {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20,20,20,0.95);
    border: 1px solid #333;
    padding: 20px 30px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 440px;
  }
  .controls h2 { font-size: 16px; text-align: center; margin-bottom: 4px; }
  .control-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .control-row label { width: 140px; font-size: 13px; }
  .control-row input[type=range] { flex: 1; }
  .control-row .val { width: 60px; text-align: right; font-size: 13px; color: #aaa; }

  .output {
    margin-top: 8px;
    padding: 10px;
    background: #111;
    border: 1px solid #333;
    font-size: 12px;
    white-space: pre;
    color: #ccc;
  }

  .stage {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
  }

  /* Wrapper holds the cat at its resting position — click target stays still */
  .cat-wrapper {
    position: absolute;
    bottom: -80px;
    left: 0;
    height: 100%;
    width: auto;
    cursor: crosshair;
    z-index: 5;
  }
  .cat-wrapper img {
    height: 100%;
    width: auto;
    display: block;
  }

  .crosshair {
    position: absolute;
    width: 24px; height: 24px;
    border: 2px solid red;
    border-radius: 50%;
    pointer-events: none;
    z-index: 20;
  }
  .crosshair::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 50px; height: 2px;
    background: red;
    transform: translate(-50%, -50%);
  }
  .crosshair::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 2px; height: 50px;
    background: red;
    transform: translate(-50%, -50%);
  }

  .mode-label {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    padding: 8px 16px;
    background: rgba(255,0,0,0.2);
    border: 1px solid red;
    z-index: 100;
    display: none;
  }
</style>
</head>
<body>

<div class="controls">
  <h2>CAT ROTATION TUNER</h2>
  <p style="font-size:11px; color:#888; text-align:center;">Click SET ORIGIN then click on the cat to place the pivot point.</p>

  <button id="setBtn" style="background:#333; color:#fff; border:1px solid #666; padding:8px; cursor:pointer; font-family:monospace; font-size:13px;">
    SET ORIGIN (click cat)
  </button>

  <div class="control-row">
    <label>origin X (%)</label>
    <input type="range" id="ox" min="0" max="100" value="25" step="1">
    <span class="val" id="oxVal">25%</span>
  </div>

  <div class="control-row">
    <label>origin Y (%)</label>
    <input type="range" id="oy" min="0" max="100" value="100" step="1">
    <span class="val" id="oyVal">100%</span>
  </div>

  <div class="control-row">
    <label>swing angle (deg)</label>
    <input type="range" id="swing" min="1" max="20" value="8" step="0.5">
    <span class="val" id="swingVal">8</span>
  </div>

  <div class="control-row">
    <label>bob Y (px)</label>
    <input type="range" id="bobY" min="0" max="80" value="40" step="2">
    <span class="val" id="bobYVal">40</span>
  </div>

  <div class="control-row">
    <label>speed (s)</label>
    <input type="range" id="speed" min="1" max="6" value="3" step="0.25">
    <span class="val" id="speedVal">3</span>
  </div>

  <div class="output" id="output"></div>
</div>

<div class="stage">
  <!-- Wrapper stays still for click detection -->
  <div class="cat-wrapper" id="catWrapper">
    <img id="cat" src="/images/cat_watching.png">
  </div>
  <div class="crosshair" id="crosshair" style="display:none;"></div>
</div>

<div class="mode-label" id="modeLabel">CLICK ON THE CAT TO SET ORIGIN</div>

<script>
  const cat = document.getElementById('cat');
  const wrapper = document.getElementById('catWrapper');
  const cross = document.getElementById('crosshair');
  const output = document.getElementById('output');
  const setBtn = document.getElementById('setBtn');
  const modeLabel = document.getElementById('modeLabel');

  const s = id => document.getElementById(id);
  const v = id => document.getElementById(id + 'Val');

  let pickMode = false;
  let phase = 0;
  let last = performance.now();
  let paused = false;

  setBtn.addEventListener('click', () => {
    pickMode = !pickMode;
    paused = pickMode;
    modeLabel.style.display = pickMode ? 'block' : 'none';
    setBtn.style.background = pickMode ? '#600' : '#333';
    setBtn.textContent = pickMode ? 'PICKING... (click cat)' : 'SET ORIGIN (click cat)';
    if (pickMode) {
      // Reset transform so click coords match
      cat.style.transform = '';
    }
  });

  wrapper.addEventListener('click', (e) => {
    if (!pickMode) return;
    const rect = cat.getBoundingClientRect();
    const ox = Math.round((e.clientX - rect.left) / rect.width * 100);
    const oy = Math.round((e.clientY - rect.top) / rect.height * 100);
    s('ox').value = Math.max(0, Math.min(100, ox));
    s('oy').value = Math.max(0, Math.min(100, oy));

    // Show crosshair at click position
    cross.style.display = 'block';
    cross.style.left = (e.clientX - 12) + 'px';
    cross.style.top = (e.clientY - 12) + 'px';

    // Exit pick mode
    pickMode = false;
    paused = false;
    modeLabel.style.display = 'none';
    setBtn.style.background = '#333';
    setBtn.textContent = 'SET ORIGIN (click cat)';

    updateOutput();
  });

  function updateOutput() {
    const ox = +s('ox').value;
    const oy = +s('oy').value;
    v('ox').textContent = ox + '%';
    v('oy').textContent = oy + '%';
    v('swing').textContent = s('swing').value;
    v('bobY').textContent = s('bobY').value;
    v('speed').textContent = s('speed').value;

    cat.style.transformOrigin = `${ox}% ${oy}%`;

    // Update crosshair position based on cat's natural bounds
    const rect = cat.getBoundingClientRect();
    cross.style.left = (rect.left + rect.width * ox / 100 - 12) + 'px';
    cross.style.top = (rect.top + rect.height * oy / 100 - 12) + 'px';
    cross.style.display = 'block';

    output.textContent =
      `transformOrigin: '${ox}% ${oy}%'\n` +
      `swing: ${s('swing').value}deg\n` +
      `bobY: ${s('bobY').value}px\n` +
      `speed: ${s('speed').value}s`;
  }

  function animate(now) {
    if (!paused) {
      const speed = +s('speed').value;
      const swing = +s('swing').value;
      const bobY = +s('bobY').value;
      const dt = (now - last) / 1000;

      phase += dt / speed * Math.PI * 2;

      const rot = Math.sin(phase) * swing;
      const ty = -Math.abs(Math.sin(phase)) * bobY;

      cat.style.transform = `translateY(${ty}px) rotate(${rot}deg)`;
    }
    last = now;
    requestAnimationFrame(animate);
  }

  ['ox','oy','swing','bobY','speed'].forEach(id =>
    s(id).addEventListener('input', updateOutput));
  updateOutput();
  requestAnimationFrame(animate);
</script>
</body>
</html>
