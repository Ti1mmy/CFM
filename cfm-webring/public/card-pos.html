<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Card Stack Position Tuner</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: monospace; }

  .controls {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20,20,20,0.95);
    border: 1px solid #333;
    padding: 20px 30px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 440px;
  }
  .controls h2 { font-size: 16px; text-align: center; margin-bottom: 4px; }
  .control-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .control-row label { width: 130px; font-size: 13px; }
  .control-row input[type=range] { flex: 1; }
  .control-row .val { width: 70px; text-align: right; font-size: 13px; color: #aaa; }

  .output {
    margin-top: 8px;
    padding: 10px;
    background: #111;
    border: 1px solid #333;
    font-size: 12px;
    white-space: pre;
    color: #ccc;
  }

  .stage {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .card-mock {
    width: 560px;
    height: 420px;
    background: #0a0a0a;
    border: 2px solid #2a2a2a;
    position: absolute;
  }
  .card-mock .bar {
    height: 32px;
    background: #050505;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 12px;
    color: #ccc;
    letter-spacing: 0.1em;
  }
  .card-mock .body {
    padding: 20px;
    font-size: 13px;
    color: #888;
    line-height: 1.8;
  }
</style>
</head>
<body>

<div class="controls">
  <h2>CARD STACK POSITION</h2>

  <div class="control-row">
    <label>margin-left (%)</label>
    <input type="range" id="ml" min="-30" max="50" value="15" step="1">
    <span class="val" id="mlVal">15%</span>
  </div>

  <div class="control-row">
    <label>margin-top (px)</label>
    <input type="range" id="mt" min="-200" max="200" value="0" step="5">
    <span class="val" id="mtVal">0px</span>
  </div>

  <div class="control-row">
    <label>rotate (deg)</label>
    <input type="range" id="rot" min="-15" max="15" value="0" step="0.5">
    <span class="val" id="rotVal">0deg</span>
  </div>

  <div class="control-row">
    <label>max-width (px)</label>
    <input type="range" id="mw" min="300" max="800" value="560" step="10">
    <span class="val" id="mwVal">560px</span>
  </div>

  <div class="control-row">
    <label>height (px)</label>
    <input type="range" id="ch" min="200" max="700" value="420" step="10">
    <span class="val" id="chVal">420px</span>
  </div>

  <div class="output" id="output"></div>
</div>

<div class="stage">
  <!-- Mock cat on the left for reference -->
  <img src="/cat_watching.png" style="position:absolute; bottom:0; left:0; height:100%; width:auto; opacity:0.3; pointer-events:none;">

  <div id="cardStack">
    <div class="card-mock" style="opacity:0.3; transform: translate(100px,-60px) scale(0.88);">
      <div class="bar">CARD 3</div>
    </div>
    <div class="card-mock" style="opacity:0.5; transform: translate(50px,-30px) scale(0.94);">
      <div class="bar">CARD 2</div>
    </div>
    <div class="card-mock">
      <div class="bar">CURRICULUM</div>
      <div class="body">
        // what you learn, year by year<br><br>
        > Year 1-2<br>
        CS fundamentals, intro accounting,<br>
        economics, statistics<br><br>
        > Year 2-3<br>
        Algorithms, OS, databases +<br>
        corporate finance, investments
      </div>
    </div>
  </div>
</div>

<script>
  const stack = document.getElementById('cardStack');
  const output = document.getElementById('output');
  const cards = stack.querySelectorAll('.card-mock');

  const s = (id) => document.getElementById(id);
  const v = (id) => document.getElementById(id + 'Val');
  const ids = ['ml', 'mt', 'rot', 'mw', 'ch'];

  function update() {
    const ml = +s('ml').value;
    const mt = +s('mt').value;
    const rot = +s('rot').value;
    const mw = +s('mw').value;
    const ch = +s('ch').value;

    v('ml').textContent = ml + '%';
    v('mt').textContent = mt + 'px';
    v('rot').textContent = rot + 'deg';
    v('mw').textContent = mw + 'px';
    v('ch').textContent = ch + 'px';

    stack.style.marginLeft = ml + '%';
    stack.style.marginTop = mt + 'px';
    stack.style.transform = `rotate(${rot}deg)`;
    stack.style.position = 'relative';

    cards.forEach(c => {
      c.style.width = mw + 'px';
      c.style.height = ch + 'px';
    });

    output.textContent =
      `marginLeft: '${ml}%'\n` +
      `marginTop: '${mt}px'\n` +
      `transform: 'rotate(${rot}deg)'\n` +
      `maxWidth: ${mw}\n` +
      `height: ${ch}`;
  }

  ids.forEach(id => s(id).addEventListener('input', update));
  update();
</script>
</body>
</html>
