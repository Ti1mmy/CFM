<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gear Rotation Axis Tuner</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: monospace; overflow: hidden; }

  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .gear-wrap {
    position: absolute;
    width: 400px;
    height: 400px;
  }
  .gear-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .gear-wrap.left { left: 0; top: 50%; transform: translateY(-50%); }
  .gear-wrap.right { right: 0; top: 50%; transform: translateY(-50%); }

  /* Crosshair showing the transform-origin point */
  .crosshair {
    position: absolute;
    width: 20px; height: 20px;
    border: 2px solid red;
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 10;
  }
  .crosshair::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 40px; height: 1px;
    background: red;
    transform: translate(-50%, -50%);
  }
  .crosshair::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 1px; height: 40px;
    background: red;
    transform: translate(-50%, -50%);
  }

  .controls {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20,20,20,0.95);
    border: 1px solid #333;
    padding: 20px 30px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 400px;
  }
  .controls h2 { font-size: 16px; text-align: center; margin-bottom: 4px; }
  .control-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .control-row label { width: 120px; font-size: 13px; }
  .control-row input[type=range] { flex: 1; }
  .control-row .val { width: 50px; text-align: right; font-size: 13px; color: #aaa; }

  .output {
    margin-top: 8px;
    padding: 10px;
    background: #111;
    border: 1px solid #333;
    font-size: 12px;
    white-space: pre;
    color: #ccc;
  }

  .center-label {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: #555;
  }
</style>
</head>
<body>

<div class="stage">
  <div class="gear-wrap left" id="leftGear">
    <img src="/left_gear.png" alt="Left Gear">
    <div class="crosshair" id="leftCrosshair"></div>
  </div>
  <div class="gear-wrap right" id="rightGear">
    <img src="/right_gear.png" alt="Right Gear">
    <div class="crosshair" id="rightCrosshair"></div>
  </div>
</div>

<div class="controls">
  <h2>GEAR ROTATION AXIS TUNER</h2>
  <p style="font-size:11px; color:#888; text-align:center;">Adjust left gear origin. Right gear mirrors automatically.</p>

  <div class="control-row">
    <label>Origin X (%)</label>
    <input type="range" id="originX" min="0" max="100" value="50" step="1">
    <span class="val" id="originXVal">50%</span>
  </div>

  <div class="control-row">
    <label>Origin Y (%)</label>
    <input type="range" id="originY" min="0" max="100" value="50" step="1">
    <span class="val" id="originYVal">50%</span>
  </div>

  <div class="control-row">
    <label>Swing Angle (deg)</label>
    <input type="range" id="swingAngle" min="5" max="45" value="15" step="1">
    <span class="val" id="swingAngleVal">15</span>
  </div>

  <div class="control-row">
    <label>Swing Speed (s)</label>
    <input type="range" id="swingSpeed" min="0.3" max="3" value="0.65" step="0.05">
    <span class="val" id="swingSpeedVal">0.65</span>
  </div>

  <div class="control-row">
    <label>Gear Size (px)</label>
    <input type="range" id="gearSize" min="100" max="800" value="400" step="10">
    <span class="val" id="gearSizeVal">400</span>
  </div>

  <div class="output" id="output"></div>
</div>

<div class="center-label">Left gear controls set the axis. Right gear mirrors: X is flipped (100% - X), Y stays same.</div>

<script>
  const leftGear = document.getElementById('leftGear');
  const rightGear = document.getElementById('rightGear');
  const leftImg = leftGear.querySelector('img');
  const rightImg = rightGear.querySelector('img');
  const leftCross = document.getElementById('leftCrosshair');
  const rightCross = document.getElementById('rightCrosshair');
  const output = document.getElementById('output');

  const sliders = {
    originX: document.getElementById('originX'),
    originY: document.getElementById('originY'),
    swingAngle: document.getElementById('swingAngle'),
    swingSpeed: document.getElementById('swingSpeed'),
    gearSize: document.getElementById('gearSize'),
  };
  const vals = {
    originX: document.getElementById('originXVal'),
    originY: document.getElementById('originYVal'),
    swingAngle: document.getElementById('swingAngleVal'),
    swingSpeed: document.getElementById('swingSpeedVal'),
    gearSize: document.getElementById('gearSizeVal'),
  };

  let angle = 0;
  let direction = 1;
  let lastTime = performance.now();

  function update() {
    const ox = +sliders.originX.value;
    const oy = +sliders.originY.value;
    const swing = +sliders.swingAngle.value;
    const speed = +sliders.swingSpeed.value;
    const size = +sliders.gearSize.value;

    vals.originX.textContent = ox + '%';
    vals.originY.textContent = oy + '%';
    vals.swingAngle.textContent = swing;
    vals.swingSpeed.textContent = speed;
    vals.gearSize.textContent = size;

    // Mirrored X for right gear
    const roxMirrored = 100 - ox;

    // Set size
    leftGear.style.width = size + 'px';
    leftGear.style.height = size + 'px';
    rightGear.style.width = size + 'px';
    rightGear.style.height = size + 'px';

    // Set transform-origin on the images
    leftImg.style.transformOrigin = `${ox}% ${oy}%`;
    rightImg.style.transformOrigin = `${roxMirrored}% ${oy}%`;

    // Position crosshairs
    leftCross.style.left = ox + '%';
    leftCross.style.top = oy + '%';
    rightCross.style.left = roxMirrored + '%';
    rightCross.style.top = oy + '%';

    // Output CSS values to copy
    output.textContent =
      `LEFT  transformOrigin: '${ox}% ${oy}%'\n` +
      `RIGHT transformOrigin: '${roxMirrored}% ${oy}%'\n` +
      `swing: ${swing}deg  speed: ${speed}s`;
  }

  function animate(now) {
    const speed = +sliders.swingSpeed.value;
    const swing = +sliders.swingAngle.value;
    const dt = (now - lastTime) / 1000;
    lastTime = now;

    angle += direction * (dt / speed) * swing * 2;
    if (angle > swing) { angle = swing; direction = -1; }
    if (angle < -swing) { angle = -swing; direction = 1; }

    leftImg.style.transform = `rotate(${angle}deg)`;
    rightImg.style.transform = `rotate(${-angle}deg)`;

    requestAnimationFrame(animate);
  }

  // Bind sliders
  Object.values(sliders).forEach(s => s.addEventListener('input', update));
  update();
  requestAnimationFrame(animate);
</script>
</body>
</html>
